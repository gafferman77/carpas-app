<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Informe enviado</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 24px; color: #166534; }
    p { margin: 0; color: #4b5563; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Gracias por el informe.</h1>
    <p>Puede cerrar esta pestaña.</p>
  </main>
</body>
</html>
